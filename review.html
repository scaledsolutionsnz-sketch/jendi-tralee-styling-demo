<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Jendi Tralee Styling</title>
<meta name="description" content="Share your experience with Jendi Tralee Styling, Christchurch personal stylist.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1512'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='54' fill='%23b0824d' text-anchor='middle'%3EJ%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="review-wrap">
  <div class="review-card">
    <span class="eyebrow">Jendi Tralee Styling</span>
    <h1>How was your experience?</h1>
    <p>Tap a star to let us know. We'd love to hear how your styling went.</p>
    <div class="star-row" id="stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <p class="review-note">Your feedback helps us keep getting better.</p>
    <p style="margin-top:26px"><a href="index.html" style="font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)">← Back to site</a></p>
  </div>
</div>

<!-- Replace with the real Google review link when available -->
<script>
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  var stars = document.querySelectorAll('#stars button');
  stars.forEach(function (b) {
    b.addEventListener('mouseenter', function () { paint(+b.dataset.v); });
    b.addEventListener('mouseleave', function () { paint(0); });
    b.addEventListener('click', function () {
      var v = +b.dataset.v;
      if (v >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
      else { window.location.href = "private.html?rating=" + v; }
    });
  });
  function paint(v) {
    stars.forEach(function (s) { s.classList.toggle('lit', +s.dataset.v <= v); });
  }
</script>
</body>
</html>
