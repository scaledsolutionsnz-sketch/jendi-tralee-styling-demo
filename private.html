<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Private Feedback | Jendi Tralee Styling</title>
<meta name="description" content="Share private feedback with Jendi Tralee Styling. We read every message." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">Jendi Tralee <span>Styling</span></a>
    <div class="nav-links">
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">Contact</a>
      <a href="tel:+64273337226" class="nav-phone">027 333 7226</a>
    </div>
  </div>
</nav>

<div class="funnel-page" style="max-width:620px;">
  <p class="eyebrow">Private feedback</p>
  <h1 class="display" style="font-size:clamp(2.4rem,6vw,3.8rem);margin-top:14px;">Tell us what we missed</h1>
  <p style="color:var(--muted);margin:16px 0 8px;">This goes straight to Jendi and stays private. Thank you for giving us the chance to make it right.</p>

  <form class="form" action="https://formsubmit.co/hello@jenditraleestyling.co.nz" method="POST" style="text-align:left;margin-top:30px;">
    <input type="hidden" name="_subject" value="Private feedback from the website" />
    <input type="hidden" name="_template" value="table" />
    <input type="text" name="_honey" style="display:none" />
    <div class="field">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" required />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />
    </div>
    <div class="field">
      <label for="message">What could we have done better?</label>
      <textarea id="message" name="message" placeholder="Tell us what happened — we're listening." required></textarea>
    </div>
    <button type="submit" class="btn btn-dark">Send privately</button>
  </form>

  <p style="margin-top:36px;"><a href="index.html" class="back-link">← Back to home</a></p>
</div>

</body>
</html>
